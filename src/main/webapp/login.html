</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">

<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>

<input class="w-5 h-5 rounded-md bg-surface-container-low border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 focus:ring-offset-transparent" id="remember" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Stay signed in for 30 days</label>
</div>

<button class="w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-primary to-secondary text-on-primary-container font-headline font-extrabold text-lg transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-[0_12px_24px_-8px_rgba(143,245,255,0.4)] hover:shadow-[0_20px_32px_-8px_rgba(143,245,255,0.5)]" type="submit">
